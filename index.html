<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <title>Mizon CRM - V7 Drilldown & API Integrations</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
:root {
  --bg-base: #09090b; 
  --bg-surface: #18181b; 
  --bg-hover: #27272a;
  
  --primary: #ededed;
  --primary-invert: #000000;
  --accent: #3b82f6;
  
  --text-main: #ededed;
  --text-secondary: #a1a1aa;
  --text-muted: #71717a;
  
  --border-light: #27272a;
  --border-hover: #3f3f46;
  
  --danger: #ef4444;
  --danger-bg: #991b1b;
  --warning: #f59e0b;
  --warning-bg: #92400e;
  --success: #10b981;
  --success-bg: rgba(16,185,129,0.1);
  
  --font-body: 'Inter', sans-serif;
  --radius-sm: 6px;
  --radius-md: 8px;
  --radius-lg: 12px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body { background-color: var(--bg-base); color: var(--text-main); font-family: var(--font-body); font-size: 14px; min-height: 100vh; overflow-x: hidden; }

/* Structural CSS */
.app-container { display: flex; height: 100vh; }
.sidebar { width: 260px; background: var(--bg-surface); border-right: 1px solid var(--border-light); display: flex; flex-direction: column; padding: 24px 16px; z-index: 10;}
.brand { font-size: 18px; font-weight: 700; color: #fff; margin-bottom: 32px; padding: 0 12px; letter-spacing: -0.5px; }

.nav-item { padding: 8px 12px; border-radius: var(--radius-sm); color: var(--text-secondary); cursor: pointer; margin-bottom: 4px; font-weight: 500; font-size: 13px; display: flex; align-items: center; gap: 8px; transition: 0.15s; }
.nav-item:hover { background: var(--bg-hover); color: var(--text-main); }
.nav-item.active { background: var(--bg-hover); color: var(--text-main); }

.main-wrapper { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: var(--bg-base); }
.topbar { height: 64px; border-bottom: 1px solid var(--border-light); display: flex; align-items: center; justify-content: space-between; padding: 0 32px; background: var(--bg-base); }
.search-bar { background: transparent; border: 1px solid var(--border-light); padding: 8px 16px; border-radius: var(--radius-sm); color: var(--text-main); width: 280px; font-size: 13px; outline: none; transition: 0.2s; }
.search-bar:focus { border-color: var(--text-secondary); }

.content-area { flex: 1; overflow-y: auto; padding: 32px; }

/* Dash & Cards */
.grid-cols-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
.grid-cols-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
.card { background: var(--bg-surface); border: 1px solid var(--border-light); border-radius: var(--radius-md); padding: 20px; transition: 0.2s;}
.card.clickable:hover { border-color: var(--text-secondary); cursor: pointer; transform: translateY(-2px); }
.card-title { color: var(--text-secondary); font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; margin-bottom: 12px; }
.card-value { font-size: 28px; font-weight: 600; color: var(--text-main); letter-spacing: -1px; }

/* Pipeline / Kanban */
.pipeline-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
.pipeline-selector { background: var(--bg-surface); border: 1px solid var(--border-light); padding: 6px 12px; color: var(--text-main); border-radius: var(--radius-sm); outline: none; font-size: 14px; cursor: pointer; }
.kanban-board { display: flex; gap: 16px; overflow-x: auto; padding-bottom: 20px; height: calc(100vh - 180px); }
.kanban-col { min-width: 280px; max-width: 280px; background: transparent; display: flex; flex-direction: column; }
.kanban-col-header { display: flex; justify-content: space-between; align-items: center; font-size: 13px; font-weight: 600; color: var(--text-secondary); margin-bottom: 16px; padding: 0 4px; }
.kanban-col-count { background: var(--bg-surface); padding: 2px 8px; border-radius: 12px; border: 1px solid var(--border-light); font-size: 11px; }
.kanban-cards { display: flex; flex-direction: column; gap: 12px; overflow-y: auto; padding: 0 8px; min-height: 200px;}
.k-card { background: var(--bg-surface); border: 1px solid var(--border-light); padding: 16px; border-radius: var(--radius-sm); cursor: grab; transition: 0.2s; position: relative; }
.k-card:active { cursor: grabbing; opacity: 0.9; }

/* Animations & Colors for SLAs */
@keyframes pulseRedBorder {
  0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); border-color: rgba(239, 68, 68, 0.7); }
  70% { box-shadow: 0 0 0 6px rgba(239, 68, 68, 0); border-color: #3f3f46;  }
  100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); border-color: rgba(239, 68, 68, 0.7); }
}

.k-card.needs-attention { animation: pulseRedBorder 2s infinite; border: 1px solid var(--danger); box-shadow: inset 0px 4px 0px 0px var(--danger); }
.k-card.status-danger { background-color: var(--danger-bg); border-color: var(--danger); color: #fff; }
.k-card.status-warning { background-color: var(--warning-bg); border-color: var(--warning); color: #fff; }
.k-card.status-danger .text-muted, .k-card.status-warning .text-muted { color: rgba(255,255,255,0.7); }

/* Overlays & Modals */
.lead-panel-overlay { position: fixed; right: 0; top: 0; height: 100vh; width: 840px; max-width: 100%; background: var(--bg-base); border-left: 1px solid var(--border-light); box-shadow: -10px 0 30px rgba(0,0,0,0.5); z-index: 100; display: flex; flex-direction: column; }
.lead-panel-header { padding: 24px; border-bottom: 1px solid var(--border-light); display: flex; justify-content: space-between; align-items: center; }
.lead-panel-body { flex: 1; display: grid; grid-template-columns: 340px 1fr; overflow: hidden; }
.lead-profile-col { border-right: 1px solid var(--border-light); padding: 24px; overflow-y: auto; }
.lead-chat-col { padding: 0px 0px; display: flex; flex-direction: column; overflow: hidden; background: #000; }

.login-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(4px); }
.login-box { width: 380px; padding: 40px; background: var(--bg-surface); border: 1px solid var(--border-light); border-radius: var(--radius-lg); text-align: center; }
.large-modal-box { width: 800px; max-width: 90%; max-height:80vh; padding: 32px; background: var(--bg-base); border: 1px solid var(--border-light); border-radius: var(--radius-lg); overflow-y:auto; }

/* Tables */
table { width: 100%; border-collapse: collapse; margin-top: 16px; font-size: 13px; }
th, td { padding: 12px; text-align: left; border-bottom: 1px solid var(--border-light); }
th { color: var(--text-muted); font-weight: 500; text-transform: uppercase; font-size: 11px; }
tr:hover td { background: var(--bg-hover); }

/* Buttons & Inputs */
.btn-primary { background: var(--primary); color: var(--primary-invert); border: 1px solid var(--primary); padding: 8px 16px; border-radius: var(--radius-sm); font-weight: 600; cursor: pointer; font-size: 13px; transition: 0.1s;}
.btn-outline { background: transparent; color: var(--text-main); border: 1px solid var(--border-light); padding: 8px 16px; border-radius: var(--radius-sm); font-weight: 500; cursor: pointer; font-size: 13px; transition: 0.1s;}
.btn-danger { background: rgba(239,68,68,0.1); color: var(--danger); border: 1px solid var(--danger); padding: 8px 16px; border-radius: var(--radius-sm); font-weight: 500; cursor: pointer; font-size: 13px; transition: 0.1s;}
.btn-success { background: var(--success); color: #fff; border: 1px solid var(--success); padding: 8px 16px; border-radius: var(--radius-sm); font-weight: 600; cursor: pointer; font-size: 13px; transition: 0.1s;}

.btn-outline:hover { background: var(--bg-hover); }

.input-base { width: 100%; background: var(--bg-base); border: 1px solid var(--border-light); padding: 10px 12px; border-radius: var(--radius-sm); color: var(--text-main); font-size: 13px; outline: none; margin-bottom: 12px; }
.input-base:focus { border-color: var(--text-secondary); }
.label-sm { font-size: 11px; color: var(--text-muted); margin-bottom: 6px; display: block; text-transform: uppercase; font-weight: 600; letter-spacing: 0.5px;}

.chat-logs-area { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 16px; padding: 24px;}
.chat-input-area { border-top: 1px solid var(--border-light); padding: 16px 24px; background: var(--bg-base); display: flex; gap: 8px;}
.sys-log { text-align: center; font-size: 11px; color: var(--text-muted); }
.msg-bubble { max-width: 85%; padding: 10px 14px; border-radius: var(--radius-md); font-size: 13px; line-height: 1.5; }
.msg-in { background: var(--bg-surface); border: 1px solid var(--border-light); align-self: flex-start; }
.msg-out { background: var(--bg-hover); border: 1px solid var(--border-light); align-self: flex-end; color: var(--primary); }

.lead-pinned-task { background: var(--warning-bg); border-bottom: 1px solid var(--warning); padding: 12px 24px; font-size: 12px; color: #fff; display: flex; flex-direction: column; gap: 4px; }

/* Tab Bar */
.settings-tab-bar { display: flex; gap: 4px; background: var(--bg-surface); border: 1px solid var(--border-light); padding: 6px; border-radius: var(--radius-md); margin-bottom: 24px; }
.settings-tab { flex: 1; text-align: center; padding: 10px; font-size: 13px; font-weight: 500; color: var(--text-secondary); cursor: pointer; border-radius: var(--radius-sm); transition: 0.2s; }
.settings-tab:hover { background: var(--bg-hover); color: var(--text-main); }
.settings-tab.active { background: var(--bg-hover); color: var(--text-main); border: 1px solid var(--border-light); font-weight: 600; }
  </style>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;

    const calculateSLAHours = (deadlineStr) => {
      if(!deadlineStr) return null;
      const tDate = new Date(deadlineStr).getTime();
      const nDate = new Date().getTime();
      return (tDate - nDate) / (1000 * 60 * 60);
    };

    const determineSLAType = (deadlineStr) => {
       const diff = calculateSLAHours(deadlineStr);
       if(diff === null) return 'none';
       if(diff < 0) return 'danger';    
       if(diff <= 2) return 'warning';  
       return 'safe';
    };

    const initialPipelines = [
      { id: 'p1', name: 'Asosiy B2C Sotuvlar' },
      { id: 'p2', name: 'B2B Hamkorlik' }
    ];

    const initialColumns = {
      'p1': [
        { id: 'NEW', title: 'Yangi Lead' },
        { id: 'CONTACTED', title: 'Aloqada' },
        { id: 'NEGOTIATION', title: 'Savdolashish' },
        { id: 'WON', title: 'Bitim (Yutuq)' },
        { id: 'LOST', title: 'Muvaffaqiyatsiz 🚫' },
      ],
      'p2': [
        { id: 'NEW', title: 'Korporativ L.' },
        { id: 'MEETING', title: 'Uchrashuv' },
        { id: 'CONTRACT', title: 'Shartnoma' },
        { id: 'WON', title: 'Zafarabod' }
      ]
    };

    const futureDate = new Date(); futureDate.setHours(futureDate.getHours() + 1);
    const dangerDate = new Date(); dangerDate.setHours(dangerDate.getHours() - 1);

    const initialLeads = [
      { id: '1', pipelineId: 'p1', name: 'Alisher B.', owner: 'menejer_1', phone: '+998 90 123 4567', region: 'Toshkent', source: 'META_ADS', status: 'NEW', actualCallAttempts: 0, deadline: null, taskDescription: null, chatLogs: [{type:'sys', date: new Date().toISOString(), text: 'Sistemaga qo\'shildi'}] },
      { id: '2', pipelineId: 'p1', name: 'LLC "Baraka"', owner: 'ceo', phone: '+998 71 222 3344', region: 'Samarqand', source: 'TELEGRAM', status: 'CONTACTED', actualCallAttempts: 1, deadline: futureDate.toISOString(), taskDescription: 'Shartnoma narxini kelishish uchun aloqaga chiqish', chatLogs: [{type:'sys', date: futureDate.toISOString(), text: 'Menejer vazifa belgiladi'}] },
      { id: '3', pipelineId: 'p1', name: 'Odiljon Q.', owner: 'menejer_1', phone: 'Yashiringan', region: 'Noma\'lum', source: 'ORGANIC', status: 'NEGOTIATION', actualCallAttempts: 3, deadline: dangerDate.toISOString(), taskDescription: 'Uchrashuv hududida kutib olish kafolati bo\'yicha gaplashish.', chatLogs: [{type:'sys', date: dangerDate.toISOString(), text: 'Muzokaralar uchun uchrashuv yozildi.'}] },
    ];

    const DashboardOverview = ({ leads, role, setSelectedLeadId }) => {
      const lostLeads = leads.filter(l => l.status === 'LOST');
      const wonLeads = leads.filter(l => l.status === 'WON');
      const tasksDanger = leads.filter(l => determineSLAType(l.deadline) === 'danger');
      const activeLeads = leads.filter(l => l.deadline);

      const [viewModal, setViewModal] = useState({ state: false, title: '', items: [], withImportExport: false });

      const openDrillDown = (title, itemsArr, impExp) => {
         setViewModal({ state: true, title, items: itemsArr, withImportExport: impExp });
      }

      return (
        <div style={{ display: 'flex', flexDirection: 'column', gap: '24px' }}>
           <h2 style={{ fontSize: '20px', letterSpacing: '-0.5px' }}>{role === 'CEO' ? 'Raxbar Tahlili (CEO Dashboard)' : 'Mening KPIm'}</h2>
           
           <div style={{ display: 'grid', gridTemplateColumns: 'repeat(5, 1fr)', gap: '16px' }}>
              <div className="card clickable" onClick={()=>openDrillDown('Jami Barcha Leadlar', leads, true)}>
                <div className="card-title">Jami Leadlar</div>
                <div className="card-value">{leads.length}</div>
              </div>
              <div className="card clickable" onClick={()=>openDrillDown('Muvaffaqiyatli Mijozlar (WON)', wonLeads, false)}>
                <div className="card-title" style={{color: 'var(--success)'}}>Muvaffaqiyatli yopilgan</div>
                <div className="card-value" style={{color: 'var(--success)'}}>{wonLeads.length}</div>
              </div>
              <div className="card clickable" onClick={()=>openDrillDown('Yo\'qotilgan Mijozlar (LOST)', lostLeads, false)}>
                <div className="card-title" style={{color: 'var(--danger)'}}>Yo'qotilganlar (LOST)</div>
                <div className="card-value">{lostLeads.length}</div>
              </div>
              <div className="card clickable" onClick={()=>openDrillDown('Kechikkan / Muddatdan o\'tgan', tasksDanger, false)}>
                <div className="card-title" style={{color: 'var(--danger)'}}>Muddatdan o'tgan</div>
                <div className="card-value" style={{color: 'var(--danger)'}}>{tasksDanger.length}</div>
              </div>
              <div className="card clickable" onClick={()=>openDrillDown('Faol va Kutilyotgan Vazifalar', activeLeads, false)}>
                <div className="card-title">Faol vazifalar</div>
                <div className="card-value">{activeLeads.length}</div>
              </div>
           </div>

           {role === 'CEO' && (
              <div className="card">
                <div className="card-title">Sotuvchi xodimlar (KPI)</div>
                <div style={{ display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: '16px', marginTop: '16px' }}>
                    <div style={{ padding: '16px', background: 'var(--bg-base)', borderRadius: '6px', border: '1px solid var(--border-light)' }}>
                      <div style={{ display: 'flex', justifyContent: 'space-between' }}><strong style={{fontSize: '16px'}}>👑 menejer_1</strong><span style={{color: 'var(--text-muted)'}}>Faoliyat ko'rsatkichlari</span></div>
                      <div style={{ marginTop: '12px', fontSize: '13px' }}>Tizimda ishladi: 6 soat 10 min <br/>📞 Qongiroqlar: 4 soat <br/>🚀 Yangi bitimlar: 15 ta</div>
                    </div>
                </div>
              </div>
           )}

           {viewModal.state && (
              <div className="login-overlay">
                 <div className="large-modal-box">
                    <div style={{display:'flex', justifyContent:'space-between', marginBottom:'24px', alignItems:'center'}}>
                       <h2 style={{fontSize: '20px'}}>{viewModal.title} ro'yxati</h2>
                       <button className="btn-outline" onClick={()=>setViewModal({...viewModal, state:false})}>Yopish</button>
                    </div>

                    {viewModal.withImportExport && (
                       <div style={{display:'flex', gap:'12px', marginBottom: '24px', paddingBottom: '16px', borderBottom: '1px solid var(--border-light)'}}>
                          <button className="btn-outline">⬇️ Jadval Import (Excel)</button>
                          <button className="btn-outline">⬆️ Mavjud Leads Export</button>
                       </div>
                    )}

                    <table>
                       <thead>
                         <tr>
                           <th>ID</th>
                           <th>Mijoz Ismi</th>
                           <th>Mas'ul (Owner)</th>
                           <th>SLA (Muddat)</th>
                           <th>Holat / Bosqich</th>
                         </tr>
                       </thead>
                       <tbody>
                         {viewModal.items.length === 0 ? <tr><td colSpan="5" style={{textAlign:'center', padding:'20px'}}>Hech qanday ma'lumot topilmadi.</td></tr> : null}
                         {viewModal.items.map(l => (
                           <tr key={l.id} style={{cursor: 'pointer'}} onClick={() => { setViewModal({...viewModal, state:false}); setSelectedLeadId(l.id); }}>
                             <td>#{l.id}</td>
                             <td style={{fontWeight:600, color: 'var(--accent)'}}>{l.name}</td>
                             <td><span style={{background:'var(--bg-hover)', border:'1px solid var(--border-light)', padding:'2px 8px', borderRadius:'12px', fontSize:'11px'}}>{l.owner}</span></td>
                             <td>
                                {l.deadline ? <span style={{color: determineSLAType(l.deadline)==='danger'?'var(--danger)':'inherit'}}>{new Date(l.deadline).toLocaleString()}</span> : <span style={{color:'var(--text-muted)'}}>- Yo'q -</span>}
                                {l.taskDescription && <div style={{fontSize:'11px', color:'var(--text-muted)', marginTop:'4px'}}>{l.taskDescription.substring(0,30)}...</div>}
                             </td>
                             <td>{l.status}</td>
                           </tr>
                         ))}
                       </tbody>
                    </table>
                 </div>
              </div>
           )}
        </div>
      );
    };

    const PipelineEditor = ({ pipelines, setPipelines, columnsMap, setColumnsMap }) => {
       const [pId, setPId] = useState(pipelines[0]?.id);
       const pipe = pipelines.find(p => p.id === pId);
       const [localCols, setLocalCols] = useState(columnsMap[pId] || []);
       
       const [isAddingPipe, setIsAddingPipe] = useState(false);
       const [newPipeName, setNewPipeName] = useState('');

       useEffect(() => { setLocalCols(columnsMap[pId] || []); }, [pId, columnsMap]);

       if(!pipe) return null;

       const addCol = () => { setLocalCols([...localCols, {id: 'STAGE_' + Date.now(), title: 'Yangi bosqich'}]); };
       const updateColTitle = (id, newTitle) => { setLocalCols(localCols.map(c => c.id === id ? {...c, title: newTitle} : c)); };
       const removeCol = (id) => { setLocalCols(localCols.filter(c => c.id !== id)); };
       
       const savePipe = () => {
          setColumnsMap({ ...columnsMap, [pId]: localCols });
          alert("Pipeline tarkibi va ketma-ketligi saqlandi.");
       };
       const updateName = (e) => {
          setPipelines(pipelines.map(p => p.id === pId ? {...p, name: e.target.value} : p));
       };
       const deletePipe = () => {
          if(pipelines.length <= 1) return alert("Ohirgi quvurni o'chira olmaysiz!");
          if(!confirm("Haqiqatdan ham bu quvurni o'chirasizmi?")) return;
          const newList = pipelines.filter(p => p.id !== pId);
          setPipelines(newList);
          setPId(newList[0].id);
       };

       const createNewPipelineForm = () => {
          if(!newPipeName) return alert("Quvur nomini kiriting!");
          const newId = 'pipe_' + Date.now();
          setPipelines([...pipelines, { id: newId, name: newPipeName }]);
          setColumnsMap({ ...columnsMap, [newId]: [{ id: 'STAGE_' + Date.now(), title: 'Yangi bosqich' }] });
          setPId(newId);
          setIsAddingPipe(false);
          setNewPipeName('');
       };

       return (
          <div style={{display:'flex', flexDirection:'column', gap:'20px'}}>
             <div style={{ padding: '24px', background: 'var(--bg-hover)', border: '1px solid var(--border-light)', borderRadius: '8px' }}>
               <span className="label-sm">Tahrirlanadigan Quvurni tanlang:</span>
               <div style={{display:'flex', gap:'8px', marginBottom: '16px'}}>
                 <select className="input-base" style={{marginBottom: 0}} value={pId} onChange={e=>setPId(e.target.value)}>
                     {pipelines.map(p => <option key={p.id} value={p.id}>{p.name}</option>)}
                 </select>
               </div>

               <span className="label-sm">Tanlangan Quvur nomi:</span>
               <input className="input-base" value={pipe.name} onChange={updateName} />
               
               <span className="label-sm" style={{marginTop: '16px'}}>Bosqichlar (Tegib tahrirlang):</span>
               <div style={{ display: 'flex', flexDirection: 'column', gap: '8px', marginBottom: '16px' }}>
                  {localCols.map((col, idx) => (
                    <div key={col.id} style={{ display: 'flex', gap: '8px' }}>
                       <span style={{padding: '10px', color: 'var(--text-muted)'}}>{idx+1}.</span>
                       <input className="input-base" style={{marginBottom: 0, flex: 1}} value={col.title} onChange={e=>updateColTitle(col.id, e.target.value)} />
                       <button className="btn-danger" onClick={()=>removeCol(col.id)}>O'chirish</button>
                    </div>
                  ))}
                  <button className="btn-outline" onClick={addCol}>+ Bosqich Qo'shish</button>
               </div>
               
               <div style={{display: 'flex', justifyContent: 'space-between', borderTop: '1px solid var(--border-light)', paddingTop: '16px'}}>
                 <button className="btn-primary" onClick={savePipe}>Tarkibni Saqlash</button>
                 <button className="btn-danger" onClick={deletePipe}>Quvurni Tubdan O'chirish (Delete)</button>
               </div>
             </div>

             {/* CREATE NEW PIPE FORM */}
             {isAddingPipe ? (
                <div style={{ padding: '16px', background: 'var(--bg-hover)', border: '1px dashed var(--border-light)', borderRadius: '8px' }}>
                   <span className="label-sm">Yangi quvur (Pipeline) nomi:</span>
                   <input className="input-base" placeholder="Asosiy savdolar yoki VIP..." value={newPipeName} onChange={e=>setNewPipeName(e.target.value)} />
                   <div style={{display:'flex', gap:'8px'}}>
                     <button className="btn-success" onClick={createNewPipelineForm}>Yaratish</button>
                     <button className="btn-outline" onClick={()=>setIsAddingPipe(false)}>Bekor qilish</button>
                   </div>
                </div>
             ) : (
                <button className="btn-outline" style={{width: '100%', padding: '12px'}} onClick={()=>setIsAddingPipe(true)}>+ Yangi Pipeline Yaratish Blokini Ochish</button>
             )}
          </div>
       )
    }

    const App = () => {

      ]);
      const [authUser, setAuthUser] = useState(null); 
      
      const [loginForm, setLoginForm] = useState({username: '', password: ''});
      const [activeTab, setActiveTab] = useState('dashboard');

                  setSelectedLeadId(null);
                  setShowCompleteModal(false);
                  setHasUnsavedChanges(false);
               }
            }
         };
         window.addEventListener('keydown', handleKeyDown);
         return () => window.removeEventListener('keydown', handleKeyDown);

         if(String(lead.id).startsWith('L_') || String(lead.id).startsWith('EXT_')) return;
         fetch('/api/leads/' + lead.id, {
            method: 'PUT',
             headers: {'Content-Type': 'application/json'},
             body: JSON.stringify({
                 status: lead.status, 
                 actualCallAttempts: lead.actualCallAttempts,
                 deadline: lead.deadline,
                 taskDescription: lead.taskDescription,
                 chatLogs: lead.chatLogs,
                 owner: lead.owner
             })
         }).catch(err => console.log('Sinxronlashda xato (Vercel topilmadi)', err));

         if(!newLeadForm.name || !newLeadForm.phone) return alert("Ism va Raqamni kiriting");

         if(!cols || cols.length === 0) return alert("Avval quvurga bosqich qo'shing");
         const initialStage = cols[0].id;

         fetch('/api/leads', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},

            if(data.success) {

                  chatLogs: [{type: 'sys', date: new Date().toISOString(), text: `Menejer (${authUser.username}) qo'lda kiritdi. Status: ${cols[0].title}`}]

               setShowAddLead(false);

             alert('Backend ulana olmadi, qoidalarga kora API ishga tushishi kerak');
         });

         if(!taskDateInput) return alert("Sana va vaqt kiritilishi shart!");
         let targetLead = null;
         setLeads(prev => prev.map(l => {
            if(l.id === id) {
                targetLead = { ...l, deadline: taskDateInput, taskDescription: taskDescInput || 'Izohsiz vazifa', chatLogs: [...l.chatLogs, {type:'sys', date: new Date().toISOString(), text:`Vazifa ochildi: "${taskDescInput || 'Izohsiz vazifa'}" -> ${new Date(taskDateInput).toLocaleString()}`}] };
                return targetLead;
            } return l;
         }));
         setTaskDateInput(''); setTaskDescInput('');
         setHasUnsavedChanges(true);
         if (targetLead) setTimeout(() => syncLeadToAPI(targetLead), 100);
      };

      const handleTaskComplete = (id) => {
         let targetLead = null;
         setLeads(prev => prev.map(l => {
            if(l.id === id) {
                targetLead = { ...l, deadline: null, taskDescription: null, chatLogs: [...l.chatLogs, {type:'sys', date: new Date().toISOString(), text:`✅ Vazifa yakunlandi! Natija/Izoh: "${taskCompleteNote || 'Izohsiz bajardi'}"`}] };
                return targetLead;
            } return l;
         }));
         setShowCompleteModal(false);
         setTaskCompleteNote('');
         setHasUnsavedChanges(true);
         if (targetLead) setTimeout(() => syncLeadToAPI(targetLead), 100);
      }

      const handleLogCall = (id) => {
         setHasUnsavedChanges(true);
         let targetLead = null;
         setLeads(prev => prev.map(l => {
           if(l.id === id) {
              const a = l.actualCallAttempts + 1;
              if (a >= globalCallLimit) {
                 targetLead = { ...l, actualCallAttempts: a, status: 'LOST', chatLogs: [...l.chatLogs, {type:'sys', date: new Date().toISOString(), text:`⛔ DIQQAT: Limit tugadi (${globalCallLimit} ta urinish). Lead asossiz tarzda Muvaffaqiyatsiz (LOST) deb hisoblandi.`}] };
                 return targetLead;
              }
              targetLead = {...l, actualCallAttempts: a, chatLogs: [...l.chatLogs, {type:'sys', date: new Date().toISOString(), text:`📞 IP Telephoniya orqali qo'ng'iroq qilindi (Qo'ng'iroq #${a} / Limit ${globalCallLimit})`}]};
              return targetLead;
           } return l;
         }));
         if (targetLead) setTimeout(() => syncLeadToAPI(targetLead), 100);

            <div style={{marginTop: 'auto', borderTop: '1px solid var(--border-light)', paddingTop: '16px'}}>
              <div style={{color: 'var(--text-muted)', fontSize: '11px', marginBottom: '8px', paddingLeft: '12px'}}>Mas'ul xodim: {authUser.username}</div>
              <div className="nav-item" onClick={() => { setAuthUser(null); }}>🚪 Tizimdan chiqish</div>
            </div>
          </aside>
          
          <main className="main-wrapper">
            <header className="topbar">
               <div style={{color: 'var(--text-muted)', fontSize:'12px'}}>V7 Ultimate Edition - Barcha funksiyalar faol.</div>
            </header>

            <div className="content-area" style={{position: 'relative'}}>
               
               {/* OVERLAYS & VIEWS */}
               {selectedLeadId && selectedLeadData ? (
                 <div className="lead-panel-overlay">
                    <div className="lead-panel-header">
                       <div><div style={{fontSize: '12px', color: 'var(--text-muted)'}}>KARTA ID: {selectedLeadData.id} • MAS'UL: <b>{selectedLeadData.owner}</b></div><div style={{fontSize: '20px', fontWeight: 600}}>{selectedLeadData.name}</div></div>
                       {hasUnsavedChanges ? (
                          <button className="btn-success" onClick={() => {setSelectedLeadId(null); setShowCompleteModal(false); setHasUnsavedChanges(false);}}>💾 O'zgarishlarni Saqlash va Yopish (Enter)</button>
                       ) : (
                          <button className="btn-outline" onClick={() => {setSelectedLeadId(null); setShowCompleteModal(false);}}>✖ Yopish/Orqaga (Enter)</button>
                       )}
                    </div>
                    <div className="lead-panel-body">
                       <div className="lead-profile-col">
                          <span className="label-sm">Mijoz axborotlari</span>
                          <div style={{ display: 'flex', flexDirection: 'column', gap: '8px', marginBottom: '24px' }}>
                             <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: '13px' }}><span style={{color: 'var(--text-muted)'}}>Telefon:</span><span>{selectedLeadData.phone}</span></div>
                             <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: '13px' }}><span style={{color: 'var(--text-muted)'}}>Manzil:</span><span>{selectedLeadData.region}</span></div>
                             <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: '13px' }}><span style={{color: 'var(--text-muted)'}}>Kanal:</span><span>{selectedLeadData.source}</span></div>
                          </div>

                          <span className="label-sm">SLA qat'iy nazorati va Vazifa Oqimi</span>
                          
                          {selectedLeadData.deadline ? (
                             <div style={{ padding: '16px', borderRadius: 'var(--radius-sm)', marginBottom: '24px', 
                               background: determineSLAType(selectedLeadData.deadline)==='danger'?'var(--danger-bg)':determineSLAType(selectedLeadData.deadline)==='warning'?'var(--warning-bg)':'var(--bg-base)',
                               border: `1px solid ${determineSLAType(selectedLeadData.deadline)==='danger'?'var(--danger)':determineSLAType(selectedLeadData.deadline)==='warning'?'#fff':'var(--border-light)'}`
                             }}>
                               <div style={{ fontSize: '11px', textTransform: 'uppercase', color: 'rgba(255,255,255,0.7)', marginBottom:'4px'}}>Vazifa Muddat Taymeri:</div>
                               <div style={{ fontSize: '14px', fontWeight: 600, color: '#fff', marginBottom:'12px'}}>
                                  ⏱️ {new Date(selectedLeadData.deadline).toLocaleString()}
                               </div>
                               
                               {!showCompleteModal ? (
                                  <button className="btn-success" style={{width: '100%', marginTop: '12px'}} onClick={()=>setShowCompleteModal(true)}>
                                    ✅ Vazifani tugatish va matn yozish
                                  </button>
                               ) : (
                                  <div style={{ marginTop: '12px', padding: '12px', background: 'rgba(0,0,0,0.5)', borderRadius: '6px' }}>
                                     <span className="label-sm">Tugatish sababi (ijro xulosasi):</span>
                                     <input className="input-base" placeholder="Natija: Shartnoma imzolandi..." value={taskCompleteNote} onChange={e=>setTaskCompleteNote(e.target.value)} />
                                     <div style={{display: 'flex', gap: '8px'}}>
                                        <button className="btn-success" style={{flex: 1}} onClick={()=>handleTaskComplete(selectedLeadData.id)}>Tasdiqlash</button>
                                        <button className="btn-outline" style={{padding: '0 8px'}} onClick={()=>setShowCompleteModal(false)}>X</button>
                                     </div>
                                  </div>
                               )}
                             </div>
                          ) : (
                             <div style={{ padding: '16px', borderRadius: 'var(--radius-sm)', marginBottom: '24px', background: 'var(--bg-hover)', border: '1px solid var(--border-light)' }}>
                               <div style={{ fontSize: '13px', color: 'var(--danger)', fontWeight: 600, marginBottom: '12px' }}>⚠️ Hozirda vazifa biriktirilmagan!</div>
                               <input className="input-base" type="text" placeholder="Vazifa haqida izoh kiritish (matn)..." value={taskDescInput} onChange={e=>setTaskDescInput(e.target.value)} />
                               <input type="datetime-local" className="input-base" value={taskDateInput} onChange={e=>setTaskDateInput(e.target.value)} />
                               <button className="btn-primary" style={{width: '100%'}} onClick={()=>{handleTaskCreate(selectedLeadData.id)}}>Vazifani o'rnatish</button>
                             </div>
                          )}

                          <span className="label-sm">Muloqot harakati</span>
                          <button className="btn-outline" style={{width: '100%', marginBottom: '24px', position:'relative', zIndex:5}} onClick={()=>handleLogCall(selectedLeadData.id)}>
                            📞 Qo'ng'iroq Start ({selectedLeadData.actualCallAttempts} / {globalCallLimit})
                          </button>

                          <span className="label-sm">Holatni / Bosqichni Qo'lda o'zgartirish</span>
                          <select className="input-base" value={selectedLeadData.status} onChange={e=>handleStatusChange(selectedLeadData.id, e.target.value)}>
                             {columnsMap[selectedLeadData.pipelineId]?.map((c) => <option key={c.id} value={c.id}>{c.title}</option>)}
                          </select>
                       </div>

                       <div className="lead-chat-col">
                          {selectedLeadData.deadline && selectedLeadData.taskDescription && (
                             <div className="lead-pinned-task">
                                <strong>📌 Faol Vazifa:</strong>
                                <span>{selectedLeadData.taskDescription}</span>
                             </div>
                          )}
                          <div className="chat-logs-area">
                             {selectedLeadData.chatLogs.map((log, idx) => {
                                if(log.type === 'sys') return <div key={idx} className="sys-log">{new Date(log.date).toLocaleTimeString()} — <b>{log.text}</b></div>;
                                return <div key={idx} className={`msg-bubble ${log.dir==='in'?'msg-in':'msg-out'}`}>{log.text}</div>;
                             })}
                          </div>
                          <div className="chat-input-area">
                             <input id="chatMessageInputBox" className="input-base" style={{marginBottom: 0}} placeholder="Chatga maxsus izoh, qayd yoki sharh yozib qoldirish..." value={chatMessageInput} onChange={e=>setChatMessageInput(e.target.value)} onKeyDown={e=>{if(e.key === 'Enter') handleSendChatMsg(selectedLeadData.id)}} />
                             <button className="btn-primary" onClick={()=>handleSendChatMsg(selectedLeadData.id)}>Yuborish</button>
                          </div>
                      </div>
                    </div>
                 </div>
               ) : null}

               {/* ADD MANUAL LEAD MODAL */}
               {showAddLead && (
                 <div className="login-overlay">
                    <div className="login-box" style={{width: '440px'}}>
                       <h2 style={{marginBottom: '24px', letterSpacing: '-0.5px'}}>+ Yangi Lead Yaratish</h2>
                       <div style={{display: 'flex', flexDirection: 'column', gap: '8px', textAlign: 'left'}}>
                          <span className="label-sm">Mijozning ism-familiyasi*</span>
                          <input className="input-base" placeholder="Masalan: Sardor Odilov" value={newLeadForm.name} onChange={e=>setNewLeadForm({...newLeadForm, name: e.target.value})} />
                          <span className="label-sm">Telefon raqami*</span>
                          <input className="input-base" placeholder="+998 XX XXX XX XX" value={newLeadForm.phone} onChange={e=>setNewLeadForm({...newLeadForm, phone: e.target.value})} />
                          <span className="label-sm">Manzili yoki shahar</span>
                          <input className="input-base" placeholder="Toshkent, Yunusobod..." value={newLeadForm.region} onChange={e=>setNewLeadForm({...newLeadForm, region: e.target.value})} />
                       </div>
                       <div style={{display: 'flex', gap: '12px', marginTop: '24px'}}>
                         <button className="btn-primary" style={{flex: 1}} onClick={handleAddManualLead}>Tasdiqlash va Qo'shish</button>
                         <button className="btn-outline" onClick={()=>setShowAddLead(false)}>Bekor qilish</button>
                       </div>
                    </div>
                 </div>
               )}

               {/* TAB ROUTING */}
               {activeTab === 'dashboard' && <DashboardOverview leads={leads} role={role} setSelectedLeadId={setSelectedLeadId} />}
               
               {activeTab === 'integrations' && <IntegrationsModule />}

               {activeTab === 'settings' && role === 'CEO' && (
                 <div style={{ maxWidth: '800px', margin: '0 auto' }}>
                    <div className="settings-tab-bar">
                       <div className={`settings-tab ${settingsActiveTab==='users'?'active':''}`} onClick={()=>setSettingsActiveTab('users')}>👥 Xodimlar (Users)</div>
                       <div className={`settings-tab ${settingsActiveTab==='limits'?'active':''}`} onClick={()=>setSettingsActiveTab('limits')}>⚙️ Umumiy (Global Setup)</div>
                       <div className={`settings-tab ${settingsActiveTab==='pipelines'?'active':''}`} onClick={()=>setSettingsActiveTab('pipelines')}>🏗️ Quvurlar (Pipelines)</div>
                       <div className={`settings-tab ${settingsActiveTab==='webforms'?'active':''}`} onClick={()=>setSettingsActiveTab('webforms')}>📝 Tashqi Web Shakl (Form)</div>
                    </div>
                    <div className="card" style={{minHeight: '400px'}}>
                       {settingsActiveTab === 'users' && (
                          <div><h3 style={{marginBottom: '16px'}}>Tizimda bor Raxbarlar va Sotuvchilar</h3><UserManagement users={users} setUsers={setUsers} /></div>
                       )}
                       {settingsActiveTab === 'limits' && (
                          <div><h3 style={{marginBottom: '16px'}}>Kompaniyaning Global Ko'rsatkichlari</h3><GlobalLimitsConfig globalCallLimit={globalCallLimit} setGlobalCallLimit={setGlobalCallLimit} /></div>
                       )}
                       {settingsActiveTab === 'pipelines' && (
                          <div><h3 style={{marginBottom: '16px'}}>Sotuv Quvurlarini Muhandisligi</h3><PipelineEditor pipelines={pipelines} setPipelines={setPipelines} columnsMap={columnsMap} setColumnsMap={setColumnsMap} /></div>
                       )}
                       {settingsActiveTab === 'webforms' && (
                          <div>
                             <h3 style={{marginBottom: '16px'}}>Shaxsiy Internet Anketalar Yaratish</h3>
                             <p style={{fontSize: '13px', color: 'var(--text-muted)', marginBottom: '16px'}}>Pipelineni tanlang va nusxalangan havolani istalgan joyga tarqating. Mijozlar o'zi raqamini yozishi bilan sizni CRM doskangizga kelib tushadi (Lead Generation).</p>
                             
                             <span className="label-sm">Qaysi Quvurga Lead tushishini xohlaysiz?</span>
                             <div style={{display:'flex', gap: '16px', alignItems: 'center'}}>
                                 <select className="input-base" style={{marginBottom: 0, width: '300px'}} onChange={e => {
                                     const lnk = window.location.origin + window.location.pathname + '?leadForm=true&pipe=' + e.target.value;
                                     navigator.clipboard.writeText(lnk);
                                     alert("Nusxalandi! \n" + lnk);
                                 }}>
                                    <option value="">-- Quvurni Tanlang --</option>
                                    {pipelines.map(p => <option key={p.id} value={p.id}>{p.name}</option>)}
                                 </select>
                                 <div style={{color:'var(--text-muted)', fontSize: '13px'}}>&larr; Tanlab bosganingiz zahoti bu havola Nusxalanadi (Copy) bo'ladi.</div>
                             </div>
                             
                             <div style={{marginTop: '24px', padding: '16px', borderRadius: '8px', background:'var(--bg-hover)', border:'1px dashed var(--border-light)'}}>
                               <strong style={{display:'block', marginBottom:'8px'}}>💡 Maslahat:</strong>
                               <div style={{fontSize: '13px', color:'var(--text-muted)'}}>Ushbu yaratilgan havolani <b>Instagram BIO</b> profiliga yoki <b>Telegram Kanalga</b> "Ro'yxatdan o'tish" knopkasi orqasida berkitib foydalaning. Menejerlaringiz boshqa qog'oz varaqlab yurishiga xojat qolmaydi.</div>
                             </div>
                          </div>
                       )}
                    </div>
                 </div>
               )}
               
               {activeTab === 'leads' && (
                 <div style={{ display: 'flex', flexDirection: 'column', height: '100%' }}>
                   <div className="pipeline-header">
                     <h2 style={{ fontSize: '20px', letterSpacing: '-0.5px' }}>Savdo Quvur doskasi (Kanban)</h2>
                     <div style={{ display: 'flex', gap: '16px', alignItems: 'center' }}>
                       <select className="pipeline-selector" value={activePipe} onChange={e => setActivePipe(e.target.value)}>
                          {pipelines.map(p => <option key={p.id} value={p.id}>{p.name}</option>)}
                       </select>
                       <button className="btn-primary" onClick={()=>setShowAddLead(true)}>+ Yangi Lead qo'shish</button>
                     </div>
                   </div>
                   
                   <div className="kanban-board">
                     {activeColumns.map((col) => {
                       const colLeads = activeLeads.filter(l => l.status === col.id);
                       return (
                         <div key={col.id} className="kanban-col" onDragOver={(e) => e.preventDefault()} onDrop={(e) => handleDrop(e, col.id)}>
                           <div className="kanban-col-header">
                             <span>{col.title}</span><span className="kanban-col-count">{colLeads.length}</span>
                           </div>
                           <div className="kanban-cards">
                             {colLeads.map(lead => {
                               const sla = determineSLAType(lead.deadline);
                               let customClass = '';
                               if(sla === 'danger') customClass = 'status-danger';
                               else if(sla === 'warning') customClass = 'status-warning';
                               else if(!lead.deadline && !['NEW', 'LOST', 'WON'].includes(lead.status)) customClass = 'needs-attention';

                               return (
                                 <div 
                                    className={`k-card ${customClass}`} 
                                    key={lead.id} 
                                    draggable={true} 
                                    onDragStart={(e) => handleDragStart(e, lead.id)}
                                    onClick={() => setSelectedLeadId(lead.id)}
                                 >
                                    <div style={{ fontWeight: 600, fontSize: '14px', marginBottom: '6px' }}>{lead.name}</div>
                                    <div className="text-muted" style={{ fontSize: '11px', marginBottom: '4px' }}>Muloqotlar: {lead.actualCallAttempts} • Mas'ul: <b>{lead.owner}</b></div>
                                    {lead.taskDescription && (
                                       <div style={{ fontSize: '11px', color: 'rgba(255,255,255,0.8)' }}>💬 {lead.taskDescription.substring(0,24)}...</div>
                                    )}
                                    {customClass === 'needs-attention' && <div style={{ fontSize: '10px', color: 'var(--danger)', marginTop: '8px', fontWeight: 600 }}>⚠️ VAZIFA KUTILYAPTI</div>}
                                 </div>
                               )
                             })}
                           </div>
                         </div>
                       )
                     })}
                   </div>
                 </div>
               )}
            </div>
          </main>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
